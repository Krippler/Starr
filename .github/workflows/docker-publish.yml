name: Docker

on:
  schedule:
    - cron: '40 4 * * *'
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login to GHCR
      - name: Log into GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ ADD: separate login for Docker Hub
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          # ✅ Push to BOTH registries in one build
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            krippler52/starr
          # Tagging policy:
          #   • a git tag v1.1.2 (a release)  → 1.1.2, 1.1, 1, AND latest
          #   • a push to main (newest code)  → edge
          # So `latest` always points at the newest *released version*, while
          # `edge` tracks the tip of main for anyone who wants bleeding edge.
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # Create a GitHub Release for every pushed version tag (v*.*.*), with notes
  # pulled from the matching CHANGELOG.md section. Runs only after the image
  # for that tag has been built, pushed, and signed.
  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC="${GITHUB_REPOSITORY,,}"

          # Pull this version's section out of CHANGELOG.md (everything between
          # "## [1.1.2]" and the next "## [" header); strip leading blanks.
          SECTION="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md | sed "/./,\$!d")"

          {
            if [ -n "$SECTION" ]; then
              printf '%s\n' "$SECTION"
            else
              echo "Release ${GITHUB_REF_NAME}."
            fi
            echo ""
            echo "### Docker images"
            echo '```bash'
            echo "docker pull krippler52/starr:${VERSION}"
            echo "docker pull ghcr.io/${REPO_LC}:${VERSION}"
            echo '```'
            echo "Also published as \`latest\`, \`${VERSION%.*}\`, and \`${VERSION%%.*}\`."
          } > notes.md

          # Idempotent: re-pushing a tag updates the existing release.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
          fi
