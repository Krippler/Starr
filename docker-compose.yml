# ─────────────────────────────────────────────────────────────────────────────
# Starr DB Repair — docker-compose
#
# Usage:
#   cp .env.example .env        # fill in your API keys + SECRET_KEY
#   docker compose up -d
#   open http://localhost:8877
#
# This config relies on Docker auto-discovery: a single /appdata mount + the
# Docker socket let Starr find every *arr container, its URL, and its DB
# without per-app configuration. Override an app's URL only if discovery
# misses (e.g. you run multiple instances).
# ─────────────────────────────────────────────────────────────────────────────

services:
  starr:
    image: krippler52/starr:latest
    # Or build locally:
    # build: .
    container_name: starr
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-8877}:8877"

    environment:
      # Runtime user — must own (or share a group with) your *arr appdata.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}

      # Web server
      PORT: 8877
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-change-me}

      # Backups
      BACKUP_DIR: /backups
      MAX_BACKUP_AGE_DAYS: ${MAX_BACKUP_AGE_DAYS:-7}

      # Per-app API keys (everything else is auto-discovered)
      SONARR_APIKEY:   ${SONARR_APIKEY:-}
      RADARR_APIKEY:   ${RADARR_APIKEY:-}
      LIDARR_APIKEY:   ${LIDARR_APIKEY:-}
      SPORTARR_APIKEY: ${SPORTARR_APIKEY:-}
      READARR_APIKEY:  ${READARR_APIKEY:-}
      PROWLARR_APIKEY: ${PROWLARR_APIKEY:-}
      WHISPARR_APIKEY: ${WHISPARR_APIKEY:-}
      BAZARR_APIKEY:   ${BAZARR_APIKEY:-}

      # Optional URL overrides (format: http://host:port[/urlbase])
      SONARR_URL:   ${SONARR_URL:-}
      RADARR_URL:   ${RADARR_URL:-}
      LIDARR_URL:   ${LIDARR_URL:-}
      SPORTARR_URL: ${SPORTARR_URL:-}
      READARR_URL:  ${READARR_URL:-}
      PROWLARR_URL: ${PROWLARR_URL:-}
      WHISPARR_URL: ${WHISPARR_URL:-}
      BAZARR_URL:   ${BAZARR_URL:-}

    volumes:
      # The host appdata root — Starr finds each *arr's /config by inspecting
      # its container and walks the relative path inside /appdata.
      - ${APPDATA_ROOT:-/mnt/user/appdata}:/appdata:rw
      # Backup output
      - ${BACKUP_PATH:-./backups}:/backups
      # Docker socket — required for auto-discovery and container-managed
      # start/stop. Leave commented to fall back to the *arr shutdown API.
      - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8877/healthz')"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

    networks:
      - starr-net

networks:
  starr-net:
    driver: bridge
